services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: trading_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn apps.api.server:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run apps/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "8501:8501"
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python apps/worker/runner.py
    env_file:
      - .env
    depends_on:
      - api
      - db
    volumes:
      - .:/app

volumes:
  pgdata:
